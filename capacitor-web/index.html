<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pace</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        background: #f5f5f4;
        color: #1c1917;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, #d1fae5, transparent 30%),
          linear-gradient(180deg, #fafaf9 0%, #f5f5f4 100%);
      }

      main {
        width: min(92vw, 28rem);
        padding: 2rem;
        border: 1px solid #e7e5e4;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 20px 50px rgba(28, 25, 23, 0.08);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Pace</h1>
      <p>
        This native shell is waiting for the deployed Pace app URL. Set
        <code>CAPACITOR_SERVER_URL</code> and run <code>npx cap sync android</code>.
      </p>
    </main>
  </body>
</html>
